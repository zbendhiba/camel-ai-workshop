- route:
    id: first-llm
    from:
      uri: timer:ask
      parameters:
        repeatCount: 1
      steps:
        - setBody:
            constant: >-
              What are the main Enterprise Integration Patterns used
              in messaging systems? Answer in 3 bullet points.
        - to:
            description: Call the LLM
            uri: openai:chat-completion
        - log:
            message: "LLM response:\n${body}"
